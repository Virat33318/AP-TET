<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="400" height="90">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Emblem Badge -->
  <rect x="5" y="10" width="70" height="70" rx="16" fill="url(#grad1)" />
  <!-- Book / Seal Icon -->
  <path d="M 22 28 Q 40 22 58 28 L 58 58 Q 40 52 22 58 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 40 25 L 40 55" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" />
  <polygon points="40,20 45,26 35,26" fill="url(#goldGrad)" />
  
  <!-- Hindi Character अ in Circle -->
  <circle cx="58" cy="28" r="10" fill="url(#goldGrad)" />
  <text x="58" y="32" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">अ</text>
  
  <!-- Brand Text -->
  <text x="90" y="38" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f172a" letter-spacing="0.5">AP TET CBT</text>
  <text x="90" y="58" font-family="'Noto Sans Devanagari', system-ui, sans-serif" font-size="14" font-weight="700" fill="#2563eb">Paper-II(A) School Assistant - हिंदी</text>
  <text x="90" y="73" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.3">OFFLINE COMPUTER BASED TEST PORTAL</text>
</svg>
